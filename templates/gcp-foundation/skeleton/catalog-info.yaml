apiVersion: backstage.io/v1alpha1
kind: Component

metadata:
  name: ${{ values.app_name }}
  title: ${{ values.environment }} GCP Infrastructure
  description: Terraform code for provisioning GCP infrastructure on Google Cloud

  annotations:
    github.com/project-slug: BackstageSSPPoC/${{ values.app_name }}                       #Replace with your own GitHub Organization's name here at Line no. 10
    backstage.io/techdocs-ref: dir:.
    backstage.io/source-location: url:https://github.com/BackstageSSPPoC/${{ values.app_name }}                   #Replace with your own GitHub Organization's name here at Line no. 12
    jenkins.io/job-full-name: Backstage_SSP_PoC/${{ values.app_name }}/main                  #Replace with your own Jenkins Organization's name here at Line no. 13

  tags:
    - gcp
    - compute
    - storage
    - networking
    - terraform
    

  links:
    - url: https://console.cloud.google.com/storage/browser/${{ values.environment }}-${{ values.bucket_name }}
      title: GCP Storage Bucket
      icon: cloud

    - url: https://console.cloud.google.com/compute/instances
      title: Compute Engine Instances (VMs)
      icon: dashboard

    - url: https://console.cloud.google.com/networking/networks/list
      title: VPC Networks
      icon: dashboard

    - url: https://github.com/BackstageSSPPoC/${{ values.app_name }}                  #Replace with your own GitHub Organization's name here at Line no. 36
      title: GitHub Repository
      icon: github

spec:
  type: infrastructure
  lifecycle: experimental
  owner: development
